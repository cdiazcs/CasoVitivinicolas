# Configuración exclusiva para la base de datos volátil de pruebas
spring.datasource.url=jdbc:h2:mem:testdb_pruebas;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Forzar a crear y destruir la estructura en cada test para que estén limpios
spring.jpa.hibernate.ddl-auto=create-drop