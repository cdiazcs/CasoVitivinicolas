<form (ngSubmit)="registrarGuia()">
  <div class="mb-3">
    <label class="form-label">Tipo de guía</label>
    <select class="form-select" [(ngModel)]="formulario.tipo" name="tipo">
      <option value="">Seleccione tipo</option>
      <option value="Compra">Compra</option>
      <option value="Venta">Venta</option>
      <option value="Traslado">Traslado</option>
    </select>
  </div>
  
  <div class="mb-3">
    <label class="form-label">Producto</label>
    <select class="form-select" [(ngModel)]="formulario.producto" name="producto">
      <option value="">Seleccione producto</option>
      <option value="Pisco Acholado">Pisco Acholado</option>
      <option value="Vino Tinto Reserva">Vino Tinto Reserva</option>
      <option value="Botella 750 ml">Botella 750 ml</option>
      <option value="Corcho Premium">Corcho Premium</option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label">Cantidad</label>
    <input type="number" class="form-control" [(ngModel)]="formulario.cantidad" name="cantidad">
  </div>

  <div class="mb-3">
    <label class="form-label">Almacén origen</label>
    <select class="form-select" [(ngModel)]="formulario.origen" name="origen">
      <option value="">Seleccione origen</option>
      <option value="Proveedor">Proveedor</option>
      <option value="Almacén Central">Almacén Central</option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label">Almacén destino</label>
    <select class="form-select" [(ngModel)]="formulario.destino" name="destino">
      <option value="">Seleccione destino</option>
      <option value="Cliente">Cliente</option>
      <option value="Almacén Central">Almacén Central</option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label">Observación</label>
    <input type="text" class="form-control" [(ngModel)]="formulario.observacion" name="observacion">
  </div>

  <button type="submit" class="btn btn-danger w-100">Registrar guía</button>
</form>

<tbody>
  <tr *ngFor="let item of guias">
    <td class="fw-bold">{{ item.nroGuia }}</td>
    <td>
      <span class="badge"
        [class.bg-success]="item.tipoMovimiento === 'Compra' || item.tipoMovimiento === 'INGRESO'"
        [class.bg-warning]="item.tipoMovimiento === 'Venta' || item.tipoMovimiento === 'SALIDA'"
        [class.bg-info]="item.tipoMovimiento === 'Traslado'">
        {{ item.tipoMovimiento }}
      </span>
    </td>
    <td colspan="4" style="font-size: 0.85rem; max-width: 280px; word-break: break-word;">
      {{ item.motivo }}
    </td>
    <td><span class="badge bg-secondary">Confirmado</span></td>
    <td>
      <button type="button" class="btn btn-sm btn-outline-danger" (click)="eliminarGuia(item.id)">
        Eliminar
      </button>
    </td>
  </tr>

  <tr *ngIf="guias.length === 0">
    <td colspan="8" class="text-center text-muted py-4">
      No hay guías registradas en la base de datos.
    </td>
  </tr>
</tbody>
